name: KernelBot Metrics
on:
  workflow_dispatch:
  push:
    branches: ["tests"] # Agora ele monitora a branch correta

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GaabDevWeb
          template: classic
          base: ""
          
          # Plugins de monitoramento
          plugin_languages: yes
          plugin_languages_details: lines, percentage
          plugin_lines: yes
          plugin_habits: yes
          plugin_habits_charts: yes

          # Configurações de Output
          filename: kernel-status.svg
          output_action: commit
          committer_branch: tests # Garante que o commit do SVG vá para a branch tests
