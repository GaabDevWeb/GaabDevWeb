name: GitHub Metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 0"
  push:
    branches: ["tests"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      # ── AniList primeiro: evita efeitos de outros passos; listas sem espaço após vírgula (parser do metrics) ──
      - name: AniList (anime e mangá)
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GaabDevWeb
          template: classic
          base: ""
          filename: metrics-anilist.svg
          output_action: commit
          committer_branch: tests
          plugin_anilist: yes
          plugin_anilist_user: GaabDevWeb
          plugin_anilist_medias: anime,manga
          plugin_anilist_sections: favorites,watching,reading,characters
          plugin_anilist_limit: 6
          plugin_anilist_limit_characters: 22
          plugin_anilist_shuffle: no

      # ── Visão geral (card clássico com header + stats) ──
      - name: Base
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GaabDevWeb
          template: classic
          base: header, activity, community, repositories, metadata
          filename: metrics-base.svg
          output_action: commit
          committer_branch: tests

      # ── Template terminal (visual SSH) ──
      - name: Terminal
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GaabDevWeb
          template: terminal
          base: header, metadata
          filename: metrics-terminal.svg
          output_action: commit
          committer_branch: tests

      # ── Isocalendar: só half-year | full-year (ver plugins/isocalendar/README.md) ──
      - name: Calendário isométrico
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GaabDevWeb
          template: classic
          base: ""
          filename: metrics-calendar.svg
          output_action: commit
          committer_branch: tests
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # ── Bio da conta GitHub (plugins/introduction/README.md); base vazio = só o bloco do plugin ──
      - name: Introdução (bio GitHub)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GaabDevWeb
          template: classic
          base: ""
          filename: metrics-introduction.svg
          output_action: commit
          committer_branch: tests
          plugin_introduction: yes

      # ── Heatmap de contribuições (desde o registo na GitHub; limit 0 = todos os anos) ──
      - name: Contribuições (histórico completo)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GaabDevWeb
          template: classic
          base: ""
          filename: metrics-contributions.svg
          output_action: commit
          committer_branch: tests
          plugin_calendar: yes
          plugin_calendar_limit: 0

      # ── Linguagens mais usadas (indepth + linhas) ──
      - name: Linguagens & Linhas
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GaabDevWeb
          template: classic
          base: ""
          filename: metrics-languages.svg
          output_action: commit
          committer_branch: tests
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: lines, percentage
          plugin_languages_limit: 8
          plugin_lines: yes

      # ── Linguagens usadas recentemente (últimos 14 dias) ──
      - name: Linguagens recentes
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GaabDevWeb
          template: classic
          base: ""
          filename: metrics-languages-recent.svg
          output_action: commit
          committer_branch: tests
          plugin_languages: yes
          plugin_languages_sections: recently-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 400

      # ── Repositórios + tráfego (views últimas 2 semanas) ──
      - name: Tráfego de repositórios
        uses: lowlighter/metrics@latest
        continue-on-error: true
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GaabDevWeb
          template: classic
          base: repositories
          filename: metrics-traffic.svg
          output_action: commit
          committer_branch: tests
          plugin_traffic: yes

      # ── Conquistas (compact, threshold X); ver plugins/achievements/README.md ──
      - name: Conquistas
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GaabDevWeb
          template: classic
          base: ""
          filename: metrics-achievements.svg
          output_action: commit
          committer_branch: tests
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: X
