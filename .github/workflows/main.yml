# =============================================================================
# 📊 GitHub Profile Metrics — lowlighter/metrics
# Atualizado para: GaabDevWeb
# =============================================================================

name: 📊 GitHub Metrics

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # JOB 1 — Header / Estatísticas gerais
  metrics-header:
    name: 🏷️ Header & Stats
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/header.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Sao_Paulo

  # JOB 2 — Lines (telemetria de refatoração)
  metrics-lines:
    name: 📐 Lines of Code
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/lines.svg
          base: ""
          template: classic
          config_timezone: America/Sao_Paulo
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_repositories_limit: 4

  # JOB 3 — Habits (rotina e disciplina)
  metrics-habits:
    name: ⏰ Coding Habits
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/habits.svg
          base: ""
          template: classic
          config_timezone: America/Sao_Paulo
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_charts: yes
          plugin_habits_trim: yes

  # JOB 4 — Languages (stack técnica)
  metrics-languages:
    name: 💻 Languages & Stack
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/languages.svg
          base: ""
          template: classic
          config_timezone: America/Sao_Paulo
          plugin_languages: yes
          plugin_languages_ignored: html, css, dockerfile, makefile, shell
          plugin_languages_details: bytes-size, percentage, lines
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          plugin_languages_limit: 8

  # JOB 5 — Achievements (validação de competências)
  metrics-achievements:
    name: 🏆 Achievements
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/achievements.svg
          base: ""
          template: classic
          plugin_achievements: yes
          plugin_achievements_display: compact # Mudado para compact para seguir sua estética brutalista
          plugin_achievements_threshold: C

  # JOB 6 — Anilist (identidade visual/estética)
  metrics-anilist:
    name: 🎌 Anilist
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/anilist.svg
          base: ""
          template: classic
          plugin_anilist: yes
          plugin_anilist_user: GaabDevWeb # Usuário atualizado
          plugin_anilist_medias: anime, manga
          plugin_anilist_sections: favorites, characters
          plugin_anilist_limit: 2
          plugin_anilist_limit_characters: 22
