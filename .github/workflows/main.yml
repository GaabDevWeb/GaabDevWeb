#gaab
name: GitHub Metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 0"
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      # ── AniList primeiro: evita efeitos de outros passos; listas sem espaço após vírgula (parser do metrics) ──
      - name: AniList (mangás favoritos e personagens)
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GaabDevWeb
          template: classic
          base: ""
          filename: metrics-anilist.svg
          output_action: commit
          committer_branch: main
          plugin_anilist: yes
          plugin_anilist_user: GaabDevWeb
          plugin_anilist_medias: manga
          plugin_anilist_sections: favorites,characters
          plugin_anilist_limit: 6
          plugin_anilist_limit_characters: 22
          plugin_anilist_shuffle: no

      # ── Isocalendar: só half-year | full-year (ver plugins/isocalendar/README.md) ──
      - name: Calendário isométrico
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GaabDevWeb
          template: classic
          base: ""
          filename: metrics-calendar.svg
          output_action: commit
          committer_branch: main
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # ── Linguagens mais usadas (indepth + linhas) ──
      - name: Linguagens & Linhas
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GaabDevWeb
          template: classic
          base: ""
          filename: metrics-languages.svg
          output_action: commit
          committer_branch: main
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: lines, percentage
          plugin_languages_limit: 8
          plugin_lines: yes

      # ── Repositórios + tráfego (views últimas 2 semanas) ──
      - name: Tráfego de repositórios
        uses: lowlighter/metrics@latest
        continue-on-error: true
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GaabDevWeb
          template: classic
          base: repositories
          filename: metrics-traffic.svg
          output_action: commit
          committer_branch: main
          plugin_traffic: yes
