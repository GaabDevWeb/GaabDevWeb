name: GitHub Metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 0"
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      # ── Visão geral (card clássico com header + stats) ──
      - name: Base
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GaabDevWeb
          template: classic
          base: header, activity, community, repositories, metadata
          filename: metrics-base.svg

      # ── Template terminal (visual SSH) ──
      - name: Terminal
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GaabDevWeb
          template: terminal
          base: header, metadata
          filename: metrics-terminal.svg

      # ── Calendário isométrico 3D — ano completo ──
      - name: Calendário isométrico
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GaabDevWeb
          template: classic
          base: ""
          filename: metrics-calendar.svg
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # ── Heatmap de contribuições (ano corrente) ──
      - name: Contribuições do ano
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GaabDevWeb
          template: classic
          base: ""
          filename: metrics-contributions.svg
          plugin_calendar: yes
          plugin_calendar_limit: 1

      # ── Hábitos de código: horários, fatos e gráficos ──
      - name: Hábitos de código
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GaabDevWeb
          template: classic
          base: ""
          filename: metrics-habits.svg
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: chartist
          plugin_habits_days: 14
          plugin_habits_trim: yes

      # ── Linguagens mais usadas (indepth + linhas) ──
      - name: Linguagens & Linhas
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GaabDevWeb
          template: classic
          base: ""
          filename: metrics-languages.svg
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: lines, percentage
          plugin_languages_limit: 8
          plugin_lines: yes

      # ── Linguagens usadas recentemente (últimos 14 dias) ──
      - name: Linguagens recentes
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GaabDevWeb
          template: classic
          base: ""
          filename: metrics-languages-recent.svg
          plugin_languages: yes
          plugin_languages_sections: recently-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 400

      # ── Repositórios + tráfego (views últimas 2 semanas) ──
      - name: Tráfego de repositórios
        uses: lowlighter/metrics@latest
        continue-on-error: true
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GaabDevWeb
          template: classic
          base: repositories
          filename: metrics-traffic.svg
          plugin_traffic: yes

      # ── Conquistas (compacto) ──
      - name: Conquistas
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GaabDevWeb
          template: classic
          base: ""
          filename: metrics-achievements.svg
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: X

      # ── Timeline de atividade recente ──
      - name: Atividade recente
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GaabDevWeb
          template: classic
          base: ""
          filename: metrics-activity.svg
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: push, pr, issue

      # ── Snippet de código real ──
      - name: Código recente
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GaabDevWeb
          template: classic
          base: ""
          filename: metrics-code.svg
          plugin_code: yes
          plugin_code_lines: 10
          plugin_code_visibility: public

      # ── Tópicos estrelados (ícones) ──
      - name: Tópicos
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GaabDevWeb
          template: classic
          base: ""
          filename: metrics-topics.svg
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 15

      # ── AniList — mangás favoritos + lendo ──
      - name: AniList Mangá
        uses: lowlighter/metrics@latest
        continue-on-error: true
        with:
          token: NOT_NEEDED
          user: GaabDevWeb
          template: classic
          base: ""
          filename: metrics-anilist.svg
          plugin_anilist: yes
          plugin_anilist_user: GaabDevWeb
          plugin_anilist_medias: manga
          plugin_anilist_sections: favorites, reading
          plugin_anilist_limit: 2

      # ── PageSpeed do portfólio ──
      - name: PageSpeed do portfólio
        uses: lowlighter/metrics@latest
        continue-on-error: true
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: GaabDevWeb
          template: classic
          base: ""
          filename: metrics-pagespeed.svg
          plugin_pagespeed: yes
          plugin_pagespeed_url: https://gaml.ai/gaabdev
          plugin_pagespeed_detailed: yes
          plugin_pagespeed_token: ${{ secrets.PAGESPEED_TOKEN }}
